<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="./img/2_character_pepe/favicon_pepe-removebg-preview.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rye&display=swap" rel="stylesheet">
    <title>El Pollo Loco</title>
</head>

<body onload="loadVolSettings(), updateSoundIcon(), setupMobileControls()">
    <h1>El Pollo Loco</h1>
    <div class="game-container">
        <div id="woodSignID" class="woodsign-div">
        </div>
        <div id="quickSettingsID" class="quick-settings-icons">
            <img id="soundIconID" onclick="processSoundClick()" onmousedown="registerClick('sound')"
                onmouseup="resetClick('sound')" src="./img/12_icons/volume.png" alt="Music icon">
            <img id="settingsIconID" class="dis-none" onclick="openSettings()" onmousedown="registerClick('settings')"
                onmouseup="resetClick('settings')" src="./img/12_icons/settings.png" alt="Settings Icon">
            <img id="touchIconID" class="dis-none" onclick="toggleTouchControl()" onmousedown="registerClick('touch')"
                onmouseup="resetClick('touch')" src="./img/12_icons/tap.png" alt="Touch Icon">
            <img id="fullscreenIconID" onclick="toggleFullscreen()" onmousedown="registerClick('fullscreen')"
                onmouseup="resetClick('fullscreen')" src="./img/12_icons/fullscreen.png" alt="Fullscreen Icon">
        </div>
        <div id="startDivID" class="overlay intro">
            <img class="start-intro" src="./img/9_intro_outro_screens/start/startscreen_3_large.png" alt="Intro-screen">
            <p class="start-button" onclick="startGame()">Start</p>
            <p class="control-button" onclick="processControlsClick()">Controls</p>
            <p class="sound-button" onclick="processSoundsClick()">Sound</p>
            <p class="fullscreen-button" onclick="toggleFullscreen()">Fullscreen</p>
        </div>
        <div id="outroDivID" class="overlay outro dis-none">
            <img id="outroImageID" class="endscreen" src="" alt="Outro-screen">
        </div>
        <div id="mobileControls" class="mobile-controls dis-none">
        </div>
        <canvas id="canvasID">
        </canvas>
    </div>
    <script src="./script/image-config.js"></script>
    <script src="./script/drawable-objects/drawable-object.class.js"></script>
    <script src="./script/drawable-objects/collectibles/collectable-bottle.class.js"></script>
    <script src="./script/drawable-objects/collectibles/collectible-gold-nuggets.class.js"></script>
    <script src="./script/drawable-objects/background/background.class.js"></script>
    <script src="./script/drawable-objects/background/background-rocks.class.js.js"></script>
    <script src="./script/drawable-objects/background/clouds.class.js"></script>
    <script src="./script/icon-bar.class.js"></script>
    <script src="./script/drawable-objects/character.class.js"></script>
    <script src="./script/drawable-objects/enemies/chicken.class.js"></script>
    <script src="./script/drawable-objects/enemies/boss-chicken.class.js"></script>
    <script src="./script/drawable-objects/enemies/boss-healthbar.class.js"></script>
    <script src="./script/drawable-objects/throwables/throwable-objects.class.js"></script>
    <script src="./script/drawable-objects/throwables/egg.class.js"></script>
    <script src="./script/drawable-objects/throwables/salsa-bottle.class.js"></script>
    <script src="./script/keyboard-input.class.js"></script>
    <script src="./script/audio.js"></script>
    <script src="./script/world/world.class.js"></script>
    <script src="./script/world/levelOne.class.js"></script>
    <script src="./script/script.js"></script>
</body>
</html>
